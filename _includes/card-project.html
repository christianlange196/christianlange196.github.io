<article class="project-card">
  <h3><a href="{{ project.url }}">{{ project.data.title }}</a></h3>
  <p>{{ project.data.excerpt }}</p>
  <p class="tags">
    {% for item in project.data.tech %}
    <span class="meta-pill">{{ item }}</span>
    {% endfor %}
  </p>
  <p class="project-links"><a href="{{ project.url }}">Read Project</a></p>
</article>
