<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | {{ site.title }}</title>
    <meta name="description" content="{{ description | default: site.description }}">
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
    <link rel="stylesheet" href="/assets/css/career-docs.css">
  </head>
  <body class="doc-page doc-{{ docVariant }}">
    <main class="doc-shell">
      {% render "career-doc-content.html", doc: careerDocs, variant: docVariant, pageTitle: title %}
    </main>
  </body>
</html>
