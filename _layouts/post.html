---
layout: default.html
---
<article class="page-content writing-detail">
  <header class="page-header">
    <p class="eyebrow">Writing</p>
    <h1>{{ title }}</h1>
    <p class="meta-row">
      <span class="meta-pill">{{ page.date | date: "%B %d, %Y" }}</span>
      {% if reading_time %}<span class="meta-pill">{{ reading_time }} min read</span>{% endif %}
    </p>
    {% if excerpt %}<p class="lead">{{ excerpt }}</p>{% endif %}
  </header>
  {{ content }}
  <section>
    <h2>Tags</h2>
    <p>
      {% for tag in tags %}
      {% render "tag-pill.html", tag: tag %}
      {% endfor %}
    </p>
  </section>
</article>
